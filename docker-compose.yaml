services:
  db:
    container_name: db
    image: postgres
    restart: unless-stopped
    shm_size: 1gb
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: dawn-db
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
