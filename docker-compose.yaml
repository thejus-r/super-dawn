services:
  cache:
    image: arm64v8/redis:6-bookworm
    container_name: cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - cache_data:/data

  db:
    container_name: database
    image: arm64v8/postgres:trixie
    restart: unless-stopped

    environment:
      POSTGRES_DB: superdawn_db
      POSTGRES_USER: sudawn
      POSTGRES_PASSWORD: example

    ports:
      - "5432:5432"

    volumes:
      - pg_data:/var/lib/postgresql

volumes:
  pg_data:
  cache_data:
